version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: smarthub-broker
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  nodered:
    image: nodered/node-red:latest
    container_name: smarthub-nodered
    restart: always
    ports:
      - "1880:1880"
    volumes:
      - ./nodered-data:/data
    user: root
